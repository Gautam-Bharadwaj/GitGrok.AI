# ruff.toml — Linting + formatting config for the backend
line-length = 100
target-version = "py312"
exclude = [
    "tmp",
    ".venv"
]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
]
ignore = [
    "B008",  # Do not perform function calls in default args (FastAPI Depends)
    "N803",  # Argument name should be lowercase (some LangChain compat)
]

[lint.isort]
known-first-party = ["app"]
